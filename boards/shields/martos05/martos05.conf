# USB HID (wired) — enabled by default on nice_nano_v2
CONFIG_ZMK_USB=y

# BLE (wireless) — enabled by default on nice_nano_v2
CONFIG_ZMK_BLE=y

# Trackpoint (PS/2 over UART) — see boards/shields/martos05/martos05-trackpoint.dtsi.
# The driver auto-activates when zmk,input-listener-ps2 node is enabled in devicetree.
# The following options are recommended by the driver author:
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000

# Debug logging over USB CDC ACM — opens a virtual COM port alongside HID.
# Enabled to diagnose trackpoint init.  Comment out after debugging.
CONFIG_ZMK_USB_LOGGING=y
CONFIG_PS2_LOG_LEVEL_DBG=y
CONFIG_UART_LOG_LEVEL_DBG=y
