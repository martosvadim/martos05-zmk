manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: infused-kim
      url-base: https://github.com/infused-kim
  projects:
    # ZMK fork with mouse/pointer support (PR #1751) — required by the
    # PS/2 trackpoint driver module. Upstream ZMK (v0.3) does not include
    # this feature yet.
    - name: zmk
      remote: infused-kim
      revision: pr-testing/mouse_ps2_module_base
      import: app/west.yml

    # PS/2 mouse & trackpoint driver module.
    - name: kb_zmk_ps2_mouse_trackpoint_driver
      remote: infused-kim
      revision: main
  self:
    path: config
